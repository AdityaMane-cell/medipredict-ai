version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://healthai:healthai123@db:5432/healthai
      SECRET_KEY: change-this-secret-key
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: healthai
      POSTGRES_PASSWORD: healthai123
      POSTGRES_DB: healthai
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
